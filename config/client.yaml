# commonplace — CLIENT-CONFIDENTIAL tier (MCP instance B, host port 8001)
#
# Extraction : LOCAL model on the host's GPU (mistral:7b-instruct-q4_0) — NEVER leaves the box
# Embedder   : Ollama nomic-embed-text (768-dim) — SHARED with the personal tier, do not change
# Graph      : commonplace_client       (one of two graphs in the shared FalkorDB)
#
# provider "openai" + a non-OpenAI api_url makes the server auto-select OpenAIGenericClient,
# which avoids OpenAI's beta responses.parse() (unimplemented by Ollama) and uses json_schema
# constrained decoding by default. SEMAPHORE_LIMIT=1 (set in compose) — a single consumer GPU
# can't sustain concurrent extraction.

server:
  transport: "http"        # FastMCP serves at path /mcp/ (trailing slash; not configurable)
  host: "0.0.0.0"
  port: 8000               # container-internal; compose maps host:8001 -> container:8000

llm:
  provider: "openai"       # non-OpenAI api_url below -> OpenAIGenericClient (the generic path)
  model: "mistral:7b-instruct-q4_0"
  max_tokens: 4096
  temperature: 0.0         # explicit (the generic client tolerates null, but keep both tiers consistent)
  providers:
    openai:
      api_key: "ollama"    # dummy; the client rejects an empty key
      api_url: ${OLLAMA_API_URL:http://host.docker.internal:11434/v1}

embedder:
  provider: "openai"
  model: "nomic-embed-text"
  dimensions: 768
  providers:
    openai:
      api_key: "ollama"
      api_url: ${OLLAMA_API_URL:http://host.docker.internal:11434/v1}

database:
  provider: "falkordb"
  providers:
    falkordb:
      uri: ${FALKORDB_URI:redis://falkordb:6379}
      password: ${FALKORDB_PASSWORD:}
      database: ${FALKORDB_DATABASE:commonplace_client}   # <-- selects the graph

graphiti:
  group_id: ${GRAPHITI_GROUP_ID:commonplace_client}
  user_id: "mcp_user"

  # --- Domain ontology (client-confidential tier) ---
  # Tuned for confidential / engagement work rather than personal life. Same
  # config schema (name + description only). The local extractor (mistral:7b) is
  # weak, so these descriptions carry extra weight — keep them concrete.
  entity_types:
    - name: Preference
      description: >-
        IMPORTANT: prioritize this classification. A stated choice, opinion, or
        requirement-of-taste from a stakeholder. Low threshold. Trigger
        patterns: "they want X", "the client prefers Y", "avoid Z". Capture the
        preference and whose it is.
    - name: Client
      description: >-
        The customer organization the engagement is for. Capture the name and
        any context about their business or domain. There is usually one primary
        Client per engagement.
    - name: Stakeholder
      description: >-
        A named person on the client side — sponsor, decision-maker, user, or
        contact. Capture their name and role. Link them to the Client and to any
        Decision or Requirement they own.
    - name: Engagement
      description: >-
        The project, contract, or body of work being delivered for the client.
        Capture its name, scope, and objective. Link deliverables, decisions,
        and requirements to the Engagement.
    - name: Deliverable
      description: >-
        A concrete artifact owed to the client — a report, system, model,
        document, or milestone. Capture what it is and its status or due date if
        mentioned.
      fields:
        - name: status
          description: Current status if stated (e.g. planned, in progress, delivered).
        - name: due_date
          description: The due date or milestone date, if stated.
    - name: Requirement
      description: >-
        A specific need the solution must fulfill. Trigger patterns: "must have
        X", "X is required", "needs to Y". Capture the requirement and link it to
        the Engagement. Note priority if stated.
      fields:
        - name: priority
          description: Priority if stated (e.g. critical, high, medium, low).
    - name: Decision
      description: >-
        A choice made during the engagement, ideally with rationale. Trigger
        patterns: "we decided X", "agreed to Y", "ruled out Z". Capture what was
        decided, why, and who decided.
      fields:
        - name: rationale
          description: Why the decision was made, if a reason is stated.
        - name: decided_by
          description: Who made or owns the decision, if stated.
    - name: Risk
      description: >-
        A potential problem, blocker, dependency, or concern that could affect
        delivery. Capture the risk and any mitigation or owner mentioned.
      fields:
        - name: mitigation
          description: The mitigation or plan to address the risk, if stated.
        - name: owner
          description: Who owns or is tracking the risk, if stated.
    - name: SystemComponent
      description: >-
        A piece of the client's technical environment — a service, database,
        integration, model, or tool relevant to the work. Capture its name and
        role.
