# commonplace — PERSONAL tier (MCP instance A, host port 8000)
#
# Extraction : hosted Claude Haiku 4.5  (best graph quality, pennies per ingest; the host has internet)
# Embedder   : Ollama nomic-embed-text (768-dim) — SHARED with the client tier, do not change
# Graph      : commonplace_personal     (one of two graphs in the shared FalkorDB)
#
# Values like ${ANTHROPIC_API_KEY} are expanded from the container env (compose env_file: .env).

server:
  transport: "http"        # FastMCP serves at path /mcp/ (trailing slash; not configurable)
  host: "0.0.0.0"
  port: 8000               # container-internal; compose maps host:8000 -> container:8000

llm:
  # Default = LOCAL (mistral via Ollama). commonplace is offline-first — nothing leaves
  # the box unless you opt in. To run the personal tier on a HOSTED model (better graph
  # quality, for NON-confidential data only), set in .env:
  #   PERSONAL_LLM_PROVIDER=anthropic
  #   PERSONAL_LLM_MODEL=claude-haiku-4-5
  #   PERSONAL_SEMAPHORE_LIMIT=5      (hosted has no GPU contention — see docker-compose.yml)
  #   ANTHROPIC_API_KEY=sk-ant-...
  # Both provider blocks below always exist; `provider` selects which one is constructed.
  provider: ${PERSONAL_LLM_PROVIDER:openai}   # "openai" (local Ollama, default) | "anthropic" (hosted)
  model: ${PERSONAL_LLM_MODEL:mistral:7b-instruct-q4_0}
  max_tokens: 4096
  temperature: 0.0         # harmless for the local path; REQUIRED if you switch to Anthropic (400s on null)
  providers:
    anthropic:
      api_key: ${ANTHROPIC_API_KEY:}   # empty default so local-only setups don't need a key
      max_retries: 3
    openai:                # used when PERSONAL_LLM_PROVIDER=openai → OpenAIGenericClient against Ollama
      api_key: "ollama"    # dummy; the generic client rejects an empty key
      api_url: ${OLLAMA_API_URL:http://host.docker.internal:11434/v1}

embedder:
  provider: "openai"       # OpenAI-compatible client pointed at Ollama (auto-uses generic client)
  model: "nomic-embed-text"
  dimensions: 768
  providers:
    openai:
      api_key: "ollama"    # dummy; the client rejects an empty key
      api_url: ${OLLAMA_API_URL:http://host.docker.internal:11434/v1}

database:
  provider: "falkordb"
  providers:
    falkordb:
      uri: ${FALKORDB_URI:redis://falkordb:6379}
      password: ${FALKORDB_PASSWORD:}
      database: ${FALKORDB_DATABASE:commonplace_personal}   # <-- selects the graph

graphiti:
  group_id: ${GRAPHITI_GROUP_ID:commonplace_personal}
  user_id: "mcp_user"

  # Payload-level tier guard (opt-in, defense-in-depth over the gateway's token
  # isolation). If set, add_memory REFUSES any write whose name/source_description/
  # body matches this regex. Recommended when you switch this tier to HOSTED
  # extraction, so confidential-tagged material can't reach the Anthropic API even
  # if a client is misconfigured with both tokens. Matches only what you specify.
  # reject_pattern: "(?i)\\b(confidential|nda|privileged|client-only)\\b"

  # --- Domain ontology (personal tier) ---
  # Each entry becomes a Pydantic model whose `description` is the extraction
  # instruction the LLM sees. Rich, trigger-pattern-style descriptions materially
  # improve extraction precision. An entry may also declare optional typed
  # `fields:` (name/type/description; all Optional) to capture structured
  # attributes. Keep this in sync with config/client.yaml's shared types so the
  # two graphs stay queryable the same way.
  entity_types:
    - name: Preference
      description: >-
        IMPORTANT: prioritize this classification. A like, dislike, choice, or
        opinion expressed by the user. Use a LOW threshold. Trigger patterns:
        "I want/like/prefer/use X", "I don't want/avoid/dislike Y", "X is
        better than Y", "go with X", "skip X". Capture the thing preferred and,
        when stated, the reason.
    - name: Person
      description: >-
        A named individual — colleague, friend, family member, author, or
        contact. Capture their name and any stated role or relationship to the
        user. Do not classify generic roles with no named person.
    - name: Organization
      description: >-
        A company, team, employer, vendor, or institution. Capture the name and
        the user's relationship to it (works at, customer of, evaluating).
    - name: Project
      description: >-
        A concrete initiative, repo, product, or piece of work the user is
        building or involved in. Capture the project name and its purpose. Link
        people, tools, and decisions to the project they belong to.
    - name: Tool
      description: >-
        A software product, library, service, framework, language, or piece of
        hardware the user uses or evaluates (e.g. Postgres, Tailscale, Neovim).
        Capture the name and what it is used for.
    - name: Decision
      description: >-
        A choice the user made or committed to, especially with a rationale.
        Trigger patterns: "we decided to X", "going with X because Y", "ruled
        out Z". Capture what was decided and why; link to the project it affects.
      fields:
        - name: rationale
          description: Why the decision was made, if a reason is stated.
        - name: decided_at
          description: When the decision was made, if stated (a date or phrase).
    - name: Goal
      description: >-
        Something the user is trying to achieve, an objective or desired
        outcome, often time-bound. Capture the goal and any deadline or success
        criterion mentioned.
      fields:
        - name: deadline
          description: The target date or timeframe, if stated.
        - name: success_criterion
          description: How success is measured, if stated.
    - name: Topic
      description: >-
        A subject, concept, or area of interest the user is learning about or
        working in (e.g. "knowledge graphs", "RAG", "home networking"). Use when
        no more specific type fits.
    - name: Resource
      description: >-
        A document, note, URL, article, or file referenced as a source of
        information. Capture a title/identifier and what it is about.
