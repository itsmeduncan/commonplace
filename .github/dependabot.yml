version: 2
updates:
  # Keep GitHub Actions pinned versions current (complements SHA-pinning).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Watch the upstream base image in the Dockerfile.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: docker
