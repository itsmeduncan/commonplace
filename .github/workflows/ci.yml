name: CI

# Validates the stack on every push to main and every PR.
# There is no application test suite — this is infra, so CI checks that the
# config is well-formed and that the custom MCP image still builds (which is
# also the real test that patch_transport_security.py's anchors still match
# the upstream zepai/knowledge-graph-mcp:standalone image).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # consider pinning to a commit SHA

      - name: Validate docker-compose (placeholder env)
        run: |
          cp .env.example .env
          docker compose config --quiet

      - name: Parse MCP config YAML
        run: |
          python3 -m pip install --quiet pyyaml
          python3 -c "import yaml, glob; [yaml.safe_load(open(f)) for f in glob.glob('config/*.yaml')]"

      - name: Syntax-check the transport patch
        run: python3 -m py_compile patch_transport_security.py

  build:
    name: Build MCP image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # consider pinning to a commit SHA

      # Builds commonplace-mcp:local end-to-end. Fails if the Anthropic SDK
      # install breaks or if patch_transport_security.py can't find its anchor
      # points in the current upstream image (it exits non-zero by design).
      - name: docker build
        run: docker build -t commonplace-mcp:ci .

  deploy:
    name: Deploy to host
    needs: [validate, build]
    # Only on push to main — never on PRs (so forks can't trigger a deploy).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      # Stays green until Tailscale OAuth secrets are configured, so CI isn't red
      # while CD is half-set-up. Add TS_OAUTH_CLIENT_ID / TS_OAUTH_SECRET to enable.
      - name: Check deploy is configured
        id: cfg
        env:
          TS_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
        run: |
          if [ -z "$TS_ID" ]; then
            echo "::notice::Tailscale OAuth not configured — skipping deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Connect to Tailscale (ephemeral, tag:ci)
        if: steps.cfg.outputs.ready == 'true'
        uses: tailscale/github-action@v2 # consider pinning to a commit SHA
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # The deploy key is locked to a forced command on the host (git reset --hard
      # origin/main && docker compose up -d --build), so the requested command is
      # irrelevant — it can run nothing else.
      - name: Deploy over SSH
        if: steps.cfg.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 \
            "$DEPLOY_HOST" deploy
          rm -f ~/.ssh/deploy_key
